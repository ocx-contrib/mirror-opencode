name: opencode
target:
  registry: ocx.sh
  repository: opencode

source:
  type: github_release
  owner: anomalyco
  repo: opencode
  tag_pattern: "^v(?P<version>\\d+\\.\\d+\\.\\d+)$"

# CLI assets only. Patterns anchored to exclude the -baseline / -musl variants
# and the desktop/electron GUI installers (deb/rpm/AppImage/dmg/exe) that share
# the opencode- prefix. Single binary at archive root on every platform.
assets:
  linux/amd64:
    - "^opencode-linux-x64\\.tar\\.gz$"
  linux/arm64:
    - "^opencode-linux-arm64\\.tar\\.gz$"
  darwin/amd64:
    - "^opencode-darwin-x64\\.zip$"
  darwin/arm64:
    - "^opencode-darwin-arm64\\.zip$"
  windows/amd64:
    - "^opencode-windows-x64\\.zip$"
  windows/arm64:
    - "^opencode-windows-arm64\\.zip$"

# Linux ships .tar.gz, darwin/windows ship .zip; `type: archive` auto-detects the
# container. Every archive is a flat single binary at the root (no wrapper dir,
# no bin/) → strip_components 0 for all → one asset_type block, no overrides.
asset_type:
  type: archive
  strip_components: 0

metadata:
  default: metadata.json

skip_prereleases: true
cascade: true
# GC-safe: each build keeps its own retained X.Y.Z+<date> tag, so a stray rebuild
# (ocx-sh/ocx#157) can't orphan a pinned digest. Bare cascade tag still floats.
build_timestamp: date

versions:
  min: "1.17.0"
  new_per_run: 5
  poll_interval: "0 */6 * * *"   # every 6 hours

verify:
  github_asset_digest: true

concurrency:
  max_downloads: 8
  max_bundles: 4
  max_pushes: 2
  rate_limit_ms: 100
  max_retries: 3
  compression_threads: 0

tests:
  - name: smoke
    script: tests/smoke.star

platforms:
  linux/amd64:
    runner: ubuntu-latest
  linux/arm64:
    runner: ubuntu-24.04-arm
  # darwin/amd64 (Intel) tested on the arm64 macos-14 runner via Rosetta 2 — the
  # arm64 ocx execs the x86_64 binary and macOS translates it. No arch prefix
  # (would mis-target the arm64 ocx → "Bad CPU type"); native macos-13 deadlocks.
  darwin/amd64:
    runner: macos-14
  darwin/arm64:
    runner: macos-14
    shell: bash
  windows/amd64:
    runner: windows-latest
    shell: pwsh
  windows/arm64:
    runner: windows-11-arm
    shell: pwsh

notify:
  discord:
    webhook_secret: OCX_MIRROR_DISCORD_HOOK
