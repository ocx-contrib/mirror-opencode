name: opencode
target:
  registry: ocx.sh
  repository: opencode

source:
  type: github_release
  owner: anomalyco
  repo: opencode
  tag_pattern: "^v(?P<version>\\d+\\.\\d+\\.\\d+)$"

# CLI assets only. Patterns anchored to exclude the -baseline / -musl variants
# and the desktop/electron GUI installers (deb/rpm/AppImage/dmg/exe) that share
# the opencode- prefix. Single binary at archive root on every platform.
assets:
  linux/amd64:
    - "^opencode-linux-x64\\.tar\\.gz$"
  linux/arm64:
    - "^opencode-linux-arm64\\.tar\\.gz$"
  # darwin/amd64 (Intel macOS) is intentionally NOT mirrored. opencode is a
  # bun-compiled binary, and bun SIGILLs (exit 132) under Rosetta 2 — proven
  # across the non-baseline, -baseline, and BUN_JSC_useJIT=0 variants; it is a
  # native-startup illegal instruction, not a JIT/AVX2 issue. GitHub retired
  # native Intel macOS runners, so the slice cannot be CI-validated (a native
  # Go/C binary like yq DOES pass darwin/amd64 via Rosetta — this is bun-only).
  # The Intel build runs fine on real Intel Macs; it just can't be tested here.
  darwin/arm64:
    - "^opencode-darwin-arm64\\.zip$"
  windows/amd64:
    - "^opencode-windows-x64\\.zip$"
  windows/arm64:
    - "^opencode-windows-arm64\\.zip$"

# Linux ships .tar.gz, darwin/windows ship .zip; `type: archive` auto-detects the
# container. Every archive is a flat single binary at the root (no wrapper dir,
# no bin/) → strip_components 0 for all → one asset_type block, no overrides.
asset_type:
  type: archive
  strip_components: 0

metadata:
  default: metadata.json

skip_prereleases: true
cascade: true
# GC-safe: each build keeps its own retained X.Y.Z+<date> tag, so a stray rebuild
# (ocx-sh/ocx#157) can't orphan a pinned digest. Bare cascade tag still floats.
build_timestamp: date

versions:
  min: "1.17.0"
  new_per_run: 3
  poll_interval: "0 */6 * * *"   # every 6 hours

verify:
  github_asset_digest: true

concurrency:
  max_downloads: 8
  max_bundles: 4
  max_pushes: 2
  rate_limit_ms: 100
  max_retries: 3
  compression_threads: 0

tests:
  - name: smoke
    script: tests/smoke.star

platforms:
  linux/amd64:
    runner: ubuntu-latest
  linux/arm64:
    runner: ubuntu-24.04-arm
  # darwin/amd64 omitted on purpose — see the assets block. bun binaries can't
  # run under Rosetta 2, and no native Intel macOS runner exists to test it.
  darwin/arm64:
    runner: macos-14
    shell: bash
  windows/amd64:
    runner: windows-latest
    shell: pwsh
  windows/arm64:
    runner: windows-11-arm
    shell: pwsh

notify:
  discord:
    webhook_secret: OCX_MIRROR_DISCORD_HOOK
